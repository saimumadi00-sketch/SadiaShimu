<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio CMS Admin</title>
  <link rel="stylesheet" href="https://unpkg.com/quill@2.0.3/dist/quill.snow.css" />
  <style>
    :root {
      --forest: #1e3d29;
      --forest-2: #2d5a3d;
      --accent: #4a7c5e;
      --danger: #b42318;
      --danger-bg: #fff1f0;
      --success: #16794f;
      --success-bg: #ecfdf3;
      --bg: #f5f7f4;
      --panel: #ffffff;
      --line: #dfe7dd;
      --text: #1d251f;
      --muted: #687469;
      --shadow: 0 16px 48px rgba(30, 61, 41, 0.12);
      --radius: 10px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.5;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
    }

    .hidden {
      display: none !important;
    }

    .noscript-message {
      margin: 24px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--danger);
      font-weight: 700;
    }

    .login-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(135deg, #eff5ee, #ffffff);
    }

    .login-card {
      width: min(420px, 100%);
      padding: 34px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    .login-card h1 {
      margin: 0 0 6px;
      color: var(--forest);
      font-size: 1.65rem;
      line-height: 1.15;
    }

    .login-card p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .app {
      min-height: 100vh;
    }

    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      width: 260px;
      overflow-y: auto;
      background: var(--forest);
      color: #eef6ef;
      padding: 24px 16px;
    }

    .brand {
      padding: 0 10px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      margin-bottom: 18px;
    }

    .brand strong {
      display: block;
      font-size: 1.05rem;
    }

    .brand span {
      display: block;
      margin-top: 4px;
      color: rgba(255, 255, 255, 0.68);
      font-size: 0.8rem;
    }

    .nav-list {
      display: grid;
      gap: 5px;
    }

    .nav-link {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 8px;
      background: transparent;
      color: rgba(255, 255, 255, 0.78);
      cursor: pointer;
      text-align: left;
      -webkit-transition: background 0.2s ease, color 0.2s ease;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .nav-link:hover,
    .nav-link.active {
      background: rgba(255, 255, 255, 0.11);
      color: #ffffff;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      margin-left: 260px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      background: #ffffff;
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .editing-label {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .editing-label strong {
      color: var(--forest);
      font-weight: 700;
    }

    .topbar-left,
    .topbar-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
    }

    .topbar-left > * + *,
    .topbar-actions > * + * {
      margin-left: 10px;
    }

    .unsaved-badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 9px;
      border-radius: 999px;
      background: #fff7df;
      color: #8a5a00;
      font-size: 0.78rem;
      font-weight: 800;
    }

    .main {
      margin-left: 260px;
      padding: 28px;
    }

    .panel-shell {
      position: relative;
      min-height: calc(100vh - 120px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 10px 32px rgba(30, 61, 41, 0.08);
      overflow: hidden;
    }

    .panel-header {
      padding: 24px 28px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .panel-header h2 {
      margin: 0;
      color: var(--forest);
      font-size: 1.55rem;
    }

    .panel-header p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .panel-body {
      position: relative;
      padding: 28px;
    }

    .spinner-overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.78);
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid #d9e8dc;
      border-top-color: var(--forest-2);
      border-radius: 999px;
      -webkit-animation: spin 0.8s linear infinite;
      animation: spin 0.8s linear infinite;
    }

    @-webkit-keyframes spin {
      to {
        -webkit-transform: rotate(360deg);
        transform: rotate(360deg);
      }
    }

    @keyframes spin {
      to {
        -webkit-transform: rotate(360deg);
        transform: rotate(360deg);
      }
    }

    .section-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 24px;
      align-items: start;
    }

    .section-grid.wide {
      grid-template-columns: 1fr;
    }

    .card,
    .form-card {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
    }

    .card + .card {
      margin-top: 12px;
    }

    .sortable-list .card,
    .sortable-list .gallery-card {
      cursor: grab;
      touch-action: manipulation;
    }

    .sortable-ghost {
      opacity: 0.45;
    }

    .sortable-chosen {
      box-shadow: var(--shadow);
    }

    .form-card h3,
    .list-title {
      margin: 0 0 14px;
      color: var(--forest);
      font-size: 1rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="number"],
    input[type="url"],
    textarea,
    select {
      width: 100%;
      border: 1px solid #cedacd;
      border-radius: 8px;
      padding: 10px 11px;
      background: #ffffff;
      color: var(--text);
      outline: none;
      -webkit-transition: border 0.2s ease, box-shadow 0.2s ease;
      transition: border 0.2s ease, box-shadow 0.2s ease;
    }

    textarea {
      min-height: 104px;
      resize: vertical;
    }

    textarea.rich-source {
      display: none;
    }

    .rich-text-wrapper {
      border: 1px solid #cedacd;
      border-radius: 8px;
      overflow: hidden;
      background: #ffffff;
    }

    .rich-text-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(74, 124, 94, 0.14);
    }

    .rich-text-wrapper .ql-toolbar {
      border: 0;
      border-bottom: 1px solid #cedacd;
      background: #f8fbf7;
    }

    .rich-text-wrapper .ql-container {
      min-height: 128px;
      border: 0;
      font: inherit;
    }

    .rich-text-wrapper .ql-editor {
      min-height: 128px;
      font: inherit;
      color: var(--text);
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(74, 124, 94, 0.14);
    }

    .check-row {
      display: flex;
      align-items: center;
      margin: 8px 0 14px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .check-row > * + * { margin-left: 8px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 9px 14px;
      border-radius: 8px;
      background: #eef5ef;
      color: var(--forest);
      cursor: pointer;
      font-weight: 700;
      -webkit-transition: background 0.2s ease, transform 0.2s ease;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .btn > * + * { margin-left: 8px; }

    .btn:hover {
      background: #e0eddf;
    }

    .btn.primary {
      background: var(--forest-2);
      color: #ffffff;
    }

    .btn.primary:hover {
      background: var(--forest);
    }

    .btn.danger {
      background: var(--danger-bg);
      color: var(--danger);
    }

    .btn.ghost {
      background: transparent;
      color: var(--muted);
    }

    .btn.small {
      min-height: 32px;
      padding: 6px 10px;
      font-size: 0.84rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .actions > * + * { margin-left: 8px; }

    .row-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .row-actions > * + * { margin-left: 8px; }

    .item-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
    }

    .item-head > * + * { margin-left: 16px; }

    .item-title {
      margin: 0;
      color: var(--text);
      font-size: 1rem;
    }

    .item-meta {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .item-desc {
      margin: 10px 0 0;
      color: #3f4d42;
      font-size: 0.92rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }

    th,
    td {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
      font-size: 0.92rem;
    }

    th {
      background: #f5f8f4;
      color: var(--forest);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .empty {
      padding: 24px;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      text-align: center;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      align-items: start;
      margin-bottom: 8px;
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .field-card-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .skill-column h3 {
      margin: 0 0 12px;
    }

    .skill-item {
      display: flex;
      justify-content: space-between;
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
      color: #3f4d42;
      font-size: 0.9rem;
    }

    .skill-item > * + * { margin-left: 10px; }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .gallery-card {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
    }

    .gallery-card img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #e6eee5;
      display: block;
    }

    .gallery-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      background: var(--danger);
      color: #ffffff;
      cursor: pointer;
      font-size: 1.15rem;
      line-height: 1;
    }

    .gallery-caption {
      padding: 12px;
    }

    .album-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .album-photo-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .album-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
    }

    .album-cover-button {
      width: 100%;
      padding: 0;
      background: transparent;
      cursor: pointer;
      text-align: left;
    }

    .album-cover {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      background: #e6eee5;
    }

    .album-body {
      padding: 14px;
    }

    .album-title-button {
      padding: 0;
      background: transparent;
      color: var(--forest);
      cursor: pointer;
      font-weight: 800;
      text-align: left;
    }

    .album-editor-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 18px;
    }

    .album-heading-input {
      max-width: 560px;
      color: var(--forest);
      font-size: 1.35rem;
      font-weight: 800;
    }

    .upload-queue {
      margin-top: 16px;
    }

    .queue-item {
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .queue-meta {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 18px;
    }

    .pagination > * + * {
      margin-left: 12px;
    }

    .upload-zone {
      display: grid;
      place-items: center;
      min-height: 160px;
      padding: 24px;
      border: 2px dashed #b9cbb8;
      border-radius: var(--radius);
      background: #f8fbf7;
      color: var(--muted);
      text-align: center;
      cursor: pointer;
      -webkit-transition: border 0.2s ease, background 0.2s ease;
      transition: border 0.2s ease, background 0.2s ease;
    }

    .upload-zone.dragover {
      border-color: var(--forest-2);
      background: #eef6ef;
    }

    .progress {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #dfe7dd;
      margin-top: 12px;
    }

    .progress-bar {
      width: 0;
      height: 100%;
      background: var(--forest-2);
      -webkit-transition: width 0.2s ease;
      transition: width 0.2s ease;
    }

    .portrait-preview {
      width: min(320px, 100%);
      aspect-ratio: 4 / 5;
      object-fit: cover;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #e6eee5;
    }

    .upload-preview {
      display: block;
      width: min(280px, 100%);
      margin-top: 12px;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #e6eee5;
    }

    .toast-stack {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 30;
      display: grid;
      gap: 10px;
      width: min(360px, calc(100vw - 36px));
    }

    .toast {
      -webkit-transform: translateX(120%);
      transform: translateX(120%);
      padding: 12px 14px;
      border-radius: 9px;
      box-shadow: var(--shadow);
      font-weight: 700;
      -webkit-transition: transform 0.25s ease, opacity 0.25s ease;
      transition: transform 0.25s ease, opacity 0.25s ease;
      opacity: 0;
    }

    .toast.show {
      -webkit-transform: translateX(0);
      transform: translateX(0);
      opacity: 1;
    }

    .toast.success {
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid #b7e2c6;
    }

    .toast.error {
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid #ffd0cc;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 25;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(14, 27, 18, 0.48);
    }

    .modal {
      width: min(420px, 100%);
      padding: 22px;
      border-radius: 12px;
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .modal h3 {
      margin: 0 0 8px;
      color: var(--forest);
    }

    .modal p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .error-text {
      min-height: 20px;
      color: var(--danger);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .inline-error {
      min-height: 18px;
      color: var(--danger);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .lookup-status {
      min-height: 18px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .lookup-status.success {
      color: var(--success);
    }

    .lookup-status.warning {
      color: #8a5a00;
    }

    .lookup-status.loading::before {
      content: '';
      display: inline-block;
      width: 10px;
      height: 10px;
      margin-right: 6px;
      border: 2px solid #cfdccd;
      border-top-color: var(--forest-2);
      border-radius: 999px;
      vertical-align: -1px;
      -webkit-animation: spin 0.8s linear infinite;
      animation: spin 0.8s linear infinite;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      align-items: start;
    }

    @media (max-width: 1020px) {
      .section-grid,
      .skills-grid,
      .field-card-grid,
      .gallery-grid,
      .album-grid,
      .album-photo-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .section-grid,
      .skills-grid,
      .field-card-grid,
      .gallery-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .sidebar {
        position: static;
        width: auto;
        max-height: 320px;
      }

      .topbar,
      .main {
        margin-left: 0;
      }

      .topbar {
        position: static;
        height: auto;
        align-items: start;
        padding: 18px;
        flex-direction: column;
      }

      .topbar > * + * {
        margin-top: 12px;
      }

      .topbar-left,
      .topbar-actions {
        width: 100%;
      }

      .topbar-actions .btn {
        flex: 1 1 150px;
      }

      .main {
        padding: 16px;
      }

      .panel-body,
      .panel-header {
        padding: 18px;
      }

      .form-grid,
      .detail-row,
      .settings-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 430px) {
      .login-card,
      .form-card,
      .card {
        padding: 16px;
      }

      .sidebar {
        padding: 16px 12px;
      }

      .nav-link,
      .btn,
      input[type="text"],
      input[type="email"],
      input[type="password"],
      input[type="number"],
      input[type="url"],
      select {
        min-height: 44px;
      }

      .main {
        padding: 10px;
      }

      .panel-shell {
        border-radius: 10px;
      }

      .panel-body,
      .panel-header {
        padding: 14px;
      }

      .section-grid {
        gap: 16px;
      }

      .item-head,
      .row-actions,
      .actions {
        flex-direction: column;
        align-items: stretch;
      }

      .item-head > * + *,
      .row-actions > * + *,
      .actions > * + * {
        margin-left: 0;
        margin-top: 8px;
      }

      .row-actions .btn,
      .actions .btn {
        width: 100%;
      }

      table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
      }

      .album-grid,
      .album-photo-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <noscript>
    <div class="noscript-message">JavaScript is required to sign in and use the CMS admin dashboard.</div>
  </noscript>

  <div id="login-screen" class="login-screen hidden">
    <form id="login-form" class="login-card">
      <h1>Portfolio CMS</h1>
      <p>Sign in to edit portfolio content.</p>
      <div class="field">
        <label for="login-email">Email</label>
        <input id="login-email" name="email" type="email" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input id="login-password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <div id="login-error" class="error-text"></div>
      <button class="btn primary" type="submit">Log In</button>
    </form>
  </div>

  <div id="app" class="app hidden">
    <aside class="sidebar">
      <div class="brand">
        <strong>Portfolio CMS</strong>
        <span>Academic portfolio editor</span>
      </div>
      <nav id="nav-list" class="nav-list"></nav>
    </aside>

    <header class="topbar">
      <div class="topbar-left">
        <div class="editing-label">Editing: <strong id="editing-email"></strong></div>
        <span id="unsaved-badge" class="unsaved-badge hidden">Unsaved changes</span>
      </div>
      <div class="topbar-actions">
        <button id="restore-draft-button" class="btn hidden" type="button">Restore Draft</button>
        <button id="backup-button" class="btn" type="button">Download Backup</button>
        <button id="logout-button" class="btn danger" type="button">Logout</button>
      </div>
    </header>

    <main class="main">
      <section class="panel-shell">
        <div class="panel-header">
          <h2 id="panel-title"></h2>
          <p id="panel-subtitle"></p>
        </div>
        <div id="panel-body" class="panel-body"></div>
      </section>
    </main>
  </div>

  <div id="toast-stack" class="toast-stack"></div>
  <div id="modal-root"></div>

  <script src="https://unpkg.com/quill@2.0.3/dist/quill.js"></script>
  <script src="https://unpkg.com/sortablejs@1.15.2/Sortable.min.js"></script>
  <script>
    const sections = [
      { id: 'hero', label: 'Hero', subtitle: 'Edit the opening headline, tagline, and stats.' },
      { id: 'about', label: 'About', subtitle: 'Manage biography paragraphs and profile details.' },
      { id: 'education', label: 'Education', subtitle: 'Add, edit, and remove academic timeline entries.' },
      { id: 'research', label: 'Research', subtitle: 'Manage current and past research cards.' },
      { id: 'publications', label: 'Publications', subtitle: 'Edit publications and research outputs.' },
      { id: 'conference', label: 'Conference', subtitle: 'Manage conference presentations.' },
      { id: 'field-cards', label: 'Field Cards', subtitle: 'Edit field experience cards.' },
      { id: 'map-markers', label: 'Map Markers', subtitle: 'Manage research and field location markers.' },
      { id: 'skills', label: 'Skills', subtitle: 'Edit skill groups and skill items.' },
      { id: 'certificates', label: 'Certificates', subtitle: 'Manage certificates and academic records.' },
      { id: 'leadership', label: 'Leadership', subtitle: 'Edit leadership and activities content.' },
      { id: 'gallery', label: 'Gallery', subtitle: 'Upload images and edit captions.' },
      { id: 'portrait', label: 'Portrait', subtitle: 'Upload the profile portrait image.' },
      { id: 'contact', label: 'Contact', subtitle: 'Edit contact section and contact links.' },
      { id: 'settings', label: 'Settings', subtitle: 'Manage account security and content backups.' }
    ];

    const state = {
      email: '',
      currentSection: 'hero',
      data: null,
      cacheBust: Date.now(),
      unsaved: false,
      galleryAlbumId: null,
      galleryPage: 1
    };

    const loginScreen = document.getElementById('login-screen');
    const app = document.getElementById('app');
    const loginForm = document.getElementById('login-form');
    const loginError = document.getElementById('login-error');
    const navList = document.getElementById('nav-list');
    const editingEmail = document.getElementById('editing-email');
    const unsavedBadge = document.getElementById('unsaved-badge');
    const restoreDraftButton = document.getElementById('restore-draft-button');
    const backupButton = document.getElementById('backup-button');
    const logoutButton = document.getElementById('logout-button');
    const panelTitle = document.getElementById('panel-title');
    const panelSubtitle = document.getElementById('panel-subtitle');
    const panelBody = document.getElementById('panel-body');
    const toastStack = document.getElementById('toast-stack');
    const modalRoot = document.getElementById('modal-root');

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function padTwo(value) {
      const text = String(value);
      return text.length >= 2 ? text : '0' + text;
    }

    function formValue(form, name) {
      return form.elements[name] ? form.elements[name].value.trim() : '';
    }

    function boolValue(form, name) {
      return form.elements[name] ? form.elements[name].checked : false;
    }

    const allowedImageTypes = new Set(['image/jpeg', 'image/png', 'image/webp']);
    const maxClientImageSize = 2 * 1024 * 1024;

    function validateImageFile(file) {
      if (!file) return 'Please select an image file.';
      if (!allowedImageTypes.has(file.type)) {
        return 'Only JPG, PNG, or WebP images are allowed.';
      }
      if (file.size > maxClientImageSize) {
        return 'Image must be 2MB or smaller.';
      }
      return '';
    }

    function showImagePreview(preview, file) {
      if (!preview || !file) return;

      if (preview.dataset.previewUrl) {
        URL.revokeObjectURL(preview.dataset.previewUrl);
      }

      const url = URL.createObjectURL(file);
      preview.dataset.previewUrl = url;
      preview.src = url;
      preview.classList.remove('hidden');
    }

    function richTextSelector() {
      return 'textarea[name="paragraph"], textarea[name="description"], textarea[name="desc"]';
    }

    function enhanceRichTextEditors(scope = panelBody) {
      if (!window.Quill) return;

      scope.querySelectorAll(richTextSelector()).forEach((textarea) => {
        if (textarea.dataset.richBound === 'true') return;

        textarea.dataset.richBound = 'true';
        textarea.classList.add('rich-source');

        const wrapper = document.createElement('div');
        wrapper.className = 'rich-text-wrapper';
        const editor = document.createElement('div');
        wrapper.appendChild(editor);
        textarea.insertAdjacentElement('afterend', wrapper);

        const quill = new Quill(editor, {
          theme: 'snow',
          modules: {
            toolbar: [
              ['bold', 'italic'],
              [{ list: 'bullet' }],
              ['link'],
              ['clean']
            ]
          }
        });

        quill.setText(textarea.value || '');
        textarea.richEditor = quill;

        quill.on('text-change', () => {
          textarea.value = quill.getText().trimEnd();
          textarea.dispatchEvent(new Event('input', { bubbles: true }));
        });
      });
    }

    function isSortableEndpoint(endpoint) {
      return ['education', 'research', 'publications'].indexOf(endpoint) !== -1;
    }

    function bindSortableList(endpoint) {
      if (!window.Sortable || !isSortableEndpoint(endpoint)) return;

      const container = panelBody.querySelector(`#${endpoint}-list`);

      if (!container || container.dataset.sortableBound === 'true') return;

      container.dataset.sortableBound = 'true';

      new Sortable(container, {
        animation: 150,
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        onEnd: async () => {
          const ids = Array.from(container.querySelectorAll('[data-entry-id]')).map((item) => item.dataset.entryId);

          try {
            const updated = await api('PATCH', `/api/content/${endpoint}/reorder`, { ids });
            state.data = updated;
            clearDraft(state.currentSection);
            setUnsaved(false);
            showToast('Order saved');
          } catch (error) {
            showToast(error.message, 'error');
            await openSection(endpoint);
          }
        }
      });
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      toastStack.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add('show'));
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 260);
      }, 3000);
    }

    function showSpinner() {
      hideSpinner();
      const overlay = document.createElement('div');
      overlay.id = 'panel-spinner';
      overlay.className = 'spinner-overlay';
      overlay.innerHTML = '<div class="spinner" aria-label="Loading"></div>';
      panelBody.appendChild(overlay);
    }

    function hideSpinner() {
      const spinner = document.getElementById('panel-spinner');
      if (spinner) spinner.remove();
    }

    function confirmDelete(message) {
      return new Promise((resolve) => {
        modalRoot.innerHTML = `
          <div class="modal-backdrop">
            <div class="modal" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
              <h3 id="confirm-title">Confirm delete</h3>
              <p>${escapeHtml(message)}</p>
              <div class="row-actions">
                <button class="btn ghost" type="button" data-confirm="false">Cancel</button>
                <button class="btn danger" type="button" data-confirm="true">Delete</button>
              </div>
            </div>
          </div>
        `;
        modalRoot.querySelectorAll('[data-confirm]').forEach((button) => {
          button.addEventListener('click', () => {
            const value = button.dataset.confirm === 'true';
            modalRoot.innerHTML = '';
            resolve(value);
          });
        });
      });
    }

    async function api(method, path, body) {
      const options = {
        method,
        credentials: 'include',
        headers: {}
      };

      if (body instanceof FormData) {
        options.body = body;
      } else if (body !== undefined && body !== null) {
        options.headers['Content-Type'] = 'application/json';
        options.body = JSON.stringify(body);
      }

      const response = await fetch(path, options);
      const text = await response.text();
      let data = null;

      if (text) {
        try {
          data = JSON.parse(text);
        } catch (error) {
          data = { error: text };
        }
      }

      if (!response.ok) {
        throw new Error(data && data.error ? data.error : `Request failed with ${response.status}`);
      }

      return data;
    }

    async function uploadWithProgress(path, formData, progressBar) {
      let progress = 8;
      progressBar.style.width = `${progress}%`;
      const timer = setInterval(() => {
        progress = Math.min(progress + 8, 88);
        progressBar.style.width = `${progress}%`;
      }, 180);

      try {
        const result = await api('POST', path, formData);
        progressBar.style.width = '100%';
        return result;
      } finally {
        clearInterval(timer);
      }
    }

    function draftKey(sectionId = state.currentSection) {
      return `portfolio-admin-draft:${sectionId}`;
    }

    function getStoredDraft(sectionId = state.currentSection) {
      try {
        const raw = localStorage.getItem(draftKey(sectionId));
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        return null;
      }
    }

    function setUnsaved(value) {
      state.unsaved = value;
      unsavedBadge.classList.toggle('hidden', !value);
      updateDraftControls();
    }

    function updateDraftControls() {
      const hasDraft = Boolean(getStoredDraft(state.currentSection));
      restoreDraftButton.classList.toggle('hidden', !hasDraft);
    }

    function collectDraftFields() {
      return Array.from(panelBody.querySelectorAll('input, textarea, select'))
        .filter((field) => field.type !== 'file')
        .map((field, index) => ({
          index,
          name: field.name || '',
          id: field.id || '',
          type: field.type || field.tagName.toLowerCase(),
          value: field.type === 'checkbox' ? field.checked : field.value
        }));
    }

    function saveCurrentDraft() {
      if (!state.unsaved || !state.currentSection) return;

      const fields = collectDraftFields();
      if (!fields.length) return;

      try {
        localStorage.setItem(draftKey(), JSON.stringify({
          section: state.currentSection,
          savedAt: new Date().toISOString(),
          fields
        }));
        updateDraftControls();
      } catch (error) {
        showToast('Autosave storage is unavailable', 'error');
      }
    }

    function clearDraft(sectionId = state.currentSection) {
      try {
        localStorage.removeItem(draftKey(sectionId));
      } catch (error) {
        return;
      }
      updateDraftControls();
    }

    function restoreCurrentDraft() {
      const draft = getStoredDraft(state.currentSection);
      if (!draft || !Array.isArray(draft.fields)) return;

      const fields = Array.from(panelBody.querySelectorAll('input, textarea, select'))
        .filter((field) => field.type !== 'file');

      draft.fields.forEach((savedField) => {
        const field = fields[savedField.index];
        if (!field) return;

        if (field.type === 'checkbox') {
          field.checked = Boolean(savedField.value);
        } else {
          field.value = savedField.value;
          if (field.richEditor) {
            field.richEditor.setText(savedField.value || '');
          }
        }

        field.dispatchEvent(new Event('input', { bubbles: true }));
      });

      setUnsaved(true);
      showToast('Draft restored');
    }

    async function downloadBackup() {
      try {
        const response = await fetch('/api/content/backup', {
          method: 'GET',
          credentials: 'include'
        });

        if (!response.ok) {
          let message = `Request failed with ${response.status}`;
          try {
            const data = await response.json();
            if (data && data.error) message = data.error;
          } catch (error) {
            // Keep the status-based message.
          }
          throw new Error(message);
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        const stamp = new Date().toISOString().slice(0, 10);
        link.href = url;
        link.download = `content-backup-${stamp}.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        showToast('Backup downloaded');
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    function showLogin() {
      app.classList.add('hidden');
      loginScreen.classList.remove('hidden');
      loginError.textContent = '';
    }

    function showDashboard(email) {
      state.email = email;
      editingEmail.textContent = email;
      loginScreen.classList.add('hidden');
      app.classList.remove('hidden');
      renderNavigation();
      updateDraftControls();
      openSection(state.currentSection);
    }

    function renderNavigation() {
      navList.innerHTML = sections.map((section) => `
        <button class="nav-link ${section.id === state.currentSection ? 'active' : ''}" type="button" data-section="${section.id}">
          <span>${escapeHtml(section.label)}</span>
        </button>
      `).join('');

      navList.querySelectorAll('[data-section]').forEach((button) => {
        button.addEventListener('click', () => {
          if (button.dataset.section === 'gallery') {
            state.galleryAlbumId = null;
            state.galleryPage = 1;
          }
          openSection(button.dataset.section);
        });
      });
    }

    async function openSection(id) {
      if (state.unsaved) {
        saveCurrentDraft();
      }

      state.currentSection = id;
      setUnsaved(false);
      renderNavigation();
      const section = sections.find((item) => item.id === id);
      panelTitle.textContent = section.label;
      panelSubtitle.textContent = section.subtitle;
      panelBody.innerHTML = '';
      showSpinner();

      try {
        if (id === 'portrait' || id === 'settings') {
          state.data = null;
          if (id === 'portrait') {
            renderPortrait();
          } else {
            renderSettings();
          }
          return;
        }

        state.data = await api('GET', `/api/content/${id === 'gallery' ? 'albums' : id}`);
        renderCurrentPanel();
      } catch (error) {
        panelBody.innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
        showToast(error.message, 'error');
      } finally {
        hideSpinner();
        enhanceRichTextEditors(panelBody);
        updateDraftControls();
      }
    }

    async function reloadSection(message) {
      if (message) showToast(message, 'success');
      clearDraft(state.currentSection);
      setUnsaved(false);
      await openSection(state.currentSection);
    }

    function renderCurrentPanel() {
      const renderers = {
        hero: renderHero,
        about: renderAbout,
        education: () => renderEntryPanel('education', educationFields, 'Add Entry'),
        research: renderResearch,
        publications: renderPublications,
        conference: renderConference,
        'field-cards': renderFieldCards,
        'map-markers': renderMapMarkers,
        skills: renderSkills,
        certificates: renderCertificates,
        leadership: renderLeadership,
        gallery: renderGallery,
        contact: renderContact
      };
      renderers[state.currentSection]();
    }

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      loginError.textContent = '';
      const body = {
        email: formValue(loginForm, 'email'),
        password: formValue(loginForm, 'password')
      };

      try {
        const result = await api('POST', '/api/login', body);
        showDashboard(result.email);
      } catch (error) {
        loginError.textContent = error.message === 'Invalid email or password' ? 'Invalid credentials' : error.message;
      }
    });

    logoutButton.addEventListener('click', async () => {
      try {
        await api('POST', '/api/logout');
      } finally {
        showLogin();
      }
    });

    backupButton.addEventListener('click', downloadBackup);
    restoreDraftButton.addEventListener('click', restoreCurrentDraft);

    panelBody.addEventListener('input', (event) => {
      if (event.target.matches('input, textarea, select')) {
        setUnsaved(true);
      }
    });

    panelBody.addEventListener('change', (event) => {
      if (event.target.matches('input, textarea, select')) {
        setUnsaved(true);
      }
    });

    setInterval(saveCurrentDraft, 30000);

    window.addEventListener('beforeunload', () => {
      if (state.unsaved) saveCurrentDraft();
    });

    function renderHero() {
      const hero = state.data;
      panelBody.innerHTML = `
        <div class="section-grid">
          <div>
            <form id="hero-form" class="form-card">
              <h3>Hero Text</h3>
              <div class="field">
                <label>Eyebrow</label>
                <input type="text" name="eyebrow" value="${escapeHtml(hero.eyebrow)}" />
              </div>
              <div class="field">
                <label>Tagline</label>
                <textarea name="tagline">${escapeHtml(hero.tagline)}</textarea>
              </div>
              <button class="btn primary" type="submit">Save Hero</button>
            </form>
            <h3 class="list-title" style="margin-top: 24px;">Stats</h3>
            <div id="stats-list">${renderStatsList(hero.stats)}</div>
          </div>
          <form id="stat-form" class="form-card">
            <h3>Add Stat</h3>
            <div class="field">
              <label>Number</label>
              <input type="text" name="num" required />
            </div>
            <div class="field">
              <label>Label</label>
              <input type="text" name="label" required />
            </div>
            <button class="btn primary" type="submit">Add Stat</button>
          </form>
        </div>
      `;

      document.getElementById('hero-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
          await api('PATCH', '/api/content/hero', {
            eyebrow: formValue(event.currentTarget, 'eyebrow'),
            tagline: formValue(event.currentTarget, 'tagline')
          });
          await reloadSection('Hero saved');
        } catch (error) {
          showToast(error.message, 'error');
        }
      });

      document.getElementById('stat-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
          await api('POST', '/api/content/hero/stats', {
            num: formValue(event.currentTarget, 'num'),
            label: formValue(event.currentTarget, 'label')
          });
          await reloadSection('Stat added');
        } catch (error) {
          showToast(error.message, 'error');
        }
      });

      bindStatsActions();
    }

    function renderStatsList(stats) {
      if (!stats.length) return '<div class="empty">No stats yet.</div>';
      return stats.map((stat) => `
        <div class="card" data-stat-id="${escapeHtml(stat.id)}">
          <div class="item-head">
            <div>
              <h4 class="item-title">${escapeHtml(stat.num)}</h4>
              <p class="item-meta">${escapeHtml(stat.label)}</p>
            </div>
            <div class="row-actions">
              <button class="btn small" type="button" data-action="edit-stat">Edit</button>
              <button class="btn small danger" type="button" data-action="delete-stat">Delete</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function bindStatsActions() {
      document.querySelectorAll('[data-action="edit-stat"]').forEach((button) => {
        button.addEventListener('click', () => {
          const card = button.closest('[data-stat-id]');
          const stat = state.data.stats.find((item) => item.id === card.dataset.statId);
          card.innerHTML = `
            <form class="stat-edit-form">
              <div class="form-grid">
                <div class="field">
                  <label>Number</label>
                  <input type="text" name="num" value="${escapeHtml(stat.num)}" required />
                </div>
                <div class="field">
                  <label>Label</label>
                  <input type="text" name="label" value="${escapeHtml(stat.label)}" required />
                </div>
              </div>
              <div class="actions">
                <button class="btn primary" type="submit">Save</button>
                <button class="btn ghost" type="button" data-action="cancel-edit">Cancel</button>
              </div>
            </form>
          `;
          card.querySelector('[data-action="cancel-edit"]').addEventListener('click', () => renderHero());
          card.querySelector('form').addEventListener('submit', async (event) => {
            event.preventDefault();
            try {
              await api('PUT', `/api/content/hero/stats/${stat.id}`, {
                num: formValue(event.currentTarget, 'num'),
                label: formValue(event.currentTarget, 'label')
              });
              await reloadSection('Stat saved');
            } catch (error) {
              showToast(error.message, 'error');
            }
          });
        });
      });

      document.querySelectorAll('[data-action="delete-stat"]').forEach((button) => {
        button.addEventListener('click', async () => {
          const id = button.closest('[data-stat-id]').dataset.statId;
          if (!(await confirmDelete('Delete this stat?'))) return;
          try {
            await api('DELETE', `/api/content/hero/stats/${id}`);
            await reloadSection('Stat deleted');
          } catch (error) {
            showToast(error.message, 'error');
          }
        });
      });
    }

    function renderAbout() {
      const about = state.data;
      panelBody.innerHTML = `
        <div class="section-grid">
          <div>
            <form id="bio-form" class="form-card">
              <h3>Biography Paragraphs</h3>
              <div id="bio-list">
                ${about.bio_paragraphs.map((paragraph, index) => bioParagraphField(paragraph, index)).join('')}
              </div>
              <div class="actions">
                <button class="btn" type="button" id="add-paragraph">Add Paragraph</button>
                <button class="btn primary" type="submit">Save Biography</button>
              </div>
            </form>
            <h3 class="list-title" style="margin-top: 24px;">Details</h3>
            <div id="details-table">${renderDetailsTable(about.details)}</div>
          </div>
          <form id="detail-form" class="form-card">
            <h3>Add Detail</h3>
            <div class="field">
              <label>Label</label>
              <input type="text" name="label" required />
            </div>
            <div class="field">
              <label>Value</label>
              <input type="text" name="value" required />
            </div>
            <button class="btn primary" type="submit">Add Detail</button>
          </form>
        </div>
      `;

      document.getElementById('add-paragraph').addEventListener('click', () => {
        const list = document.getElementById('bio-list');
        list.insertAdjacentHTML('beforeend', bioParagraphField('', list.querySelectorAll('textarea').length));
        enhanceRichTextEditors(list);
      });

      document.getElementById('bio-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        const bio_paragraphs = Array.from(event.currentTarget.querySelectorAll('textarea[name="paragraph"]'))
          .map((textarea) => textarea.value.trim())
          .filter(Boolean);
        try {
          await api('PATCH', '/api/content/about', { bio_paragraphs });
          await reloadSection('Biography saved');
        } catch (error) {
          showToast(error.message, 'error');
        }
      });

      document.getElementById('detail-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
          await api('POST', '/api/content/about/details', {
            label: formValue(event.currentTarget, 'label'),
            value: formValue(event.currentTarget, 'value')
          });
          await reloadSection('Detail added');
        } catch (error) {
          showToast(error.message, 'error');
        }
      });

      bindDetailsActions();
    }

    function bioParagraphField(paragraph, index) {
      return `
        <div class="field">
          <label>Paragraph ${index + 1}</label>
          <textarea name="paragraph">${escapeHtml(paragraph)}</textarea>
        </div>
      `;
    }

    function renderDetailsTable(details) {
      if (!details.length) return '<div class="empty">No details yet.</div>';
      return `
        <table>
          <thead><tr><th>Label</th><th>Value</th><th>Actions</th></tr></thead>
          <tbody>
            ${details.map((detail) => `
              <tr data-detail-id="${escapeHtml(detail.id)}">
                <td>${escapeHtml(detail.label)}</td>

    function decimalCoordinateText(marker) {
      return marker ? `${marker.lat}, ${marker.lng}` : '';
    }

    function parseCoordinates(value) {
      const text = String(value || '').trim();
      const decimalMatch = text.match(/^([+-]?\d+(?:\.\d+)?)\s*,\s*([+-]?\d+(?:\.\d+)?)$/);

      if (decimalMatch) {
        return validCoordinates(Number(decimalMatch[1]), Number(decimalMatch[2]));
      }

      const dmsPattern = /(\d+(?:\.\d+)?)\s*(?:°|d)?\s*(\d+(?:\.\d+)?)?\s*(?:'|m|’)?\s*(\d+(?:\.\d+)?)?\s*(?:"|s|”)?\s*([NSEW])/gi;
      const matches = [];
      let match;

      while ((match = dmsPattern.exec(text)) !== null) {
        const degrees = Number(match[1]);
        const minutes = Number(match[2] || 0);
        const seconds = Number(match[3] || 0);
        const direction = match[4].toUpperCase();
        let decimal = degrees + (minutes / 60) + (seconds / 3600);
        if (direction === 'S' || direction === 'W') decimal *= -1;
        matches.push({ direction, decimal });
      }

      const latPart = matches.find((item) => item.direction === 'N' || item.direction === 'S');
      const lngPart = matches.find((item) => item.direction === 'E' || item.direction === 'W');

      if (latPart && lngPart) {
        return validCoordinates(latPart.decimal, lngPart.decimal);
      }

      return null;
    }

    function validCoordinates(lat, lng) {
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return null;
      if (lat < -90 || lat > 90 || lng < -180 || lng > 180) return null;
      return { lat, lng };
    }

      return `

          <div class="lookup-status" data-lookup-status></div>
          <div class="inline-error" data-coordinate-error></div>
        </div>
        <div class="field"><label>Title</label><input type="text" name="title" value="${escapeHtml(marker ? marker.title : '')}" required /></div>
        <div class="field"><label>Description</label><textarea name="desc">${escapeHtml(marker ? marker.desc : '')}</textarea></div>
      `;
    }

    function setCoordinateError(form, message) {

    }

    function setLookupStatus(form, message, type = '') {
      const status = form.querySelector('[data-lookup-status]');

      status.className = `lookup-status ${type}`.trim();
      status.textContent = message || '';
    }

    function bindCoordinateLookup(form) {
      const input = form.querySelector('[name="coordinates"]');
      if (!input || input.dataset.lookupBound === 'true') return;

      input.dataset.lookupBound = 'true';
      let timer = null;

      const runLookup = () => {
        clearTimeout(timer);
        const coordinates = parseCoordinates(input.value);
        setCoordinateError(form, '');

        if (!coordinates) {
          setLookupStatus(form, '');
          return;
        }

        reverseLookupCoordinates(form, coordinates);
      };

      input.addEventListener('input', () => {
        clearTimeout(timer);
        timer = setTimeout(runLookup, 600);
      });
      input.addEventListener('blur', runLookup);
    }

    async function reverseLookupCoordinates(form, coordinates) {
      setLookupStatus(form, 'Looking up location...', 'loading');

      try {
        const data = await api('GET', `/api/geocode/reverse?lat=${encodeURIComponent(coordinates.lat)}&lng=${encodeURIComponent(coordinates.lng)}`);
        const displayName = data && data.display_name ? data.display_name : '';
        const title = displayName.split(',').slice(0, 2).map((part) => part.trim()).filter(Boolean).join(', ');

        if (!title) {
          setLookupStatus(form, 'Could not detect name — enter manually', 'warning');
          return;
        }

        form.querySelector('[name="title"]').value = title;
        setLookupStatus(form, '✓ Location name detected', 'success');
      } catch (error) {
        setLookupStatus(form, 'Could not detect name — enter manually', 'warning');
      }
    }

    function bindAlbumUpload(albumId) {
      const zone = document.getElementById('album-upload-zone');
      const fileInput = document.getElementById('album-files');

      zone.addEventListener('click', () => fileInput.click());
      zone.addEventListener('dragover', (event) => {
        event.preventDefault();

      });
      zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
      zone.addEventListener('drop', (event) => {
        event.preventDefault();
        zone.classList.remove('dragover');
        uploadAlbumFiles(albumId, Array.from(event.dataTransfer.files || []));
      });
      fileInput.addEventListener('change', () => uploadAlbumFiles(albumId, Array.from(fileInput.files || [])));
    }

    async function uploadAlbumFiles(albumId, files) {
      const queue = document.getElementById('upload-queue');
      const counter = document.getElementById('upload-counter');
      const selectedFiles = files.slice(0, 50);

      if (files.length > 50) {
        showToast('Only the first 50 files will be uploaded', 'error');
      }

      queue.innerHTML = selectedFiles.map((file, index) => `
        <div class="queue-item" data-queue-index="${index}">
          <div class="queue-meta">
            <span>${escapeHtml(file.name)} (${Math.round(file.size / 1024)} KB)</span>
            <span data-status>pending</span>
          </div>
          <div class="progress"><div class="progress-bar" data-progress></div></div>
        </div>
      `).join('');

      let uploaded = 0;
      counter.textContent = `${uploaded} of ${selectedFiles.length} uploaded`;

      for (let index = 0; index < selectedFiles.length; index += 1) {
        const file = selectedFiles[index];
        const row = queue.querySelector(`[data-queue-index="${index}"]`);
        const status = row.querySelector('[data-status]');
        const progressBar = row.querySelector('[data-progress]');
        const validationError = validateImageFile(file);

        if (validationError) {
          status.textContent = 'error';
          showToast(`${file.name}: ${validationError}`, 'error');
          continue;
        }

        const formData = new FormData();
        formData.append('image', file);
        formData.append('caption', '');

        try {
          status.textContent = 'uploading';
          await uploadWithProgress(`/api/content/albums/${albumId}/photos`, formData, progressBar);
          uploaded += 1;
          status.textContent = 'done';
          counter.textContent = `${uploaded} of ${selectedFiles.length} uploaded`;
        } catch (error) {
          status.textContent = 'error';
          showToast(error.message, 'error');
        }
      }

      state.cacheBust = Date.now();
      await refreshAlbums();
      renderGallery();
    }

      panelBody.querySelectorAll('[data-action="delete-photo"]').forEach((button) => {
        button.addEventListener('click', async () => {
          const photoId = button.closest('[data-photo-id]').dataset.photoId;
          if (!(await confirmDelete('Delete this photo?'))) return;
          try {
            await api('DELETE', `/api/content/albums/${album.id}/photos/${photoId}`);
            state.cacheBust = Date.now();
            await refreshAlbums();
            renderGallery();
            showToast('Photo deleted');
          } catch (error) {
            showToast(error.message, 'error');
          }
        });
      });
    }

    function bindAlbumPhotoSorting(album, pageStart) {
      const container = panelBody.querySelector('#album-photo-list');
      if (!window.Sortable || !container || container.dataset.sortableBound === 'true') return;

      container.dataset.sortableBound = 'true';
      new Sortable(container, {
        animation: 150,
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        onEnd: async () => {
          const pageIds = Array.from(container.querySelectorAll('[data-photo-id]')).map((item) => item.dataset.photoId);
          const ids = album.photos.map((photo) => photo.id);
          ids.splice(pageStart, pageIds.length, ...pageIds);

          try {
            const updated = await api('POST', `/api/content/albums/${album.id}/reorder`, { ids });
            const index = state.data.findIndex((item) => item.id === album.id);
            if (index !== -1) state.data[index] = updated;
            showToast('Photo order saved');
          } catch (error) {
            showToast(error.message, 'error');
            await refreshAlbums();
            renderGallery();
          }
        }
      });
    }

    function renderPortrait() {
      panelBody.innerHTML = `
        <div class="section-grid">
          <div class="card">
            <h3 class="list-title">Current Portrait</h3>
            <img id="current-portrait" class="portrait-preview" src="/images/portrait.jpg?v=${state.cacheBust}" alt="Current portrait" />
          </div>
          <div class="form-card">
            <h3>Upload Portrait</h3>
            <div class="field">
              <label>Select Image</label>
              <input id="portrait-file" type="file" accept="image/jpeg,image/png,image/webp,.jpg,.jpeg,.png,.webp" />
            </div>
            <img id="portrait-preview" class="portrait-preview hidden" alt="Portrait preview" />
            <div class="actions">
              <button id="portrait-upload" class="btn primary" type="button" disabled>Upload Portrait</button>
            </div>
          </div>
        </div>
      `;

      const fileInput = document.getElementById('portrait-file');
      const preview = document.getElementById('portrait-preview');
      const uploadButton = document.getElementById('portrait-upload');
      let selectedFile = null;

      fileInput.addEventListener('change', () => {
        selectedFile = fileInput.files[0] || null;
        if (!selectedFile) {
          preview.classList.add('hidden');
          uploadButton.disabled = true;
          return;
        }

        const validationError = validateImageFile(selectedFile);
        if (validationError) {
          showToast(validationError, 'error');
          selectedFile = null;
          fileInput.value = '';
          preview.classList.add('hidden');
          uploadButton.disabled = true;
          return;
        }

        showImagePreview(preview, selectedFile);
        uploadButton.disabled = false;
      });

      uploadButton.addEventListener('click', async () => {
        if (!selectedFile) return;
        const formData = new FormData();
        formData.append('portrait', selectedFile);
        try {
          await api('POST', '/api/content/portrait/upload', formData);
          state.cacheBust = Date.now();
          showToast('Portrait uploaded', 'success');
          renderPortrait();
        } catch (error) {
          showToast(error.message, 'error');
        }
      });
    }

    function renderSettings() {
      panelBody.innerHTML = `
        <div class="settings-grid">
          <form id="password-form" class="form-card">
            <h3>Change Password</h3>
            <div class="field">
              <label>Current Password</label>
              <input type="password" name="currentPassword" autocomplete="current-password" required />
            </div>
            <div class="field">
              <label>New Password</label>
              <input type="password" name="newPassword" autocomplete="new-password" minlength="8" required />
            </div>
            <div class="field">
              <label>Confirm New Password</label>
              <input type="password" name="confirmPassword" autocomplete="new-password" minlength="8" required />
            </div>
            <button class="btn primary" type="submit">Change Password</button>
          </form>
          <div class="form-card">
            <h3>Content Backup</h3>
            <p class="item-meta">Download the current portfolio content JSON for safekeeping.</p>
            <div class="actions">
              <button id="settings-backup-button" class="btn primary" type="button">Download Backup</button>
            </div>
          </div>
        </div>
      `;

      document.getElementById('settings-backup-button').addEventListener('click', downloadBackup);
      document.getElementById('password-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        const form = event.currentTarget;
        const newPassword = formValue(form, 'newPassword');
        const confirmPassword = formValue(form, 'confirmPassword');

        if (newPassword !== confirmPassword) {
          showToast('New passwords do not match', 'error');
          return;
        }

        try {
          await api('POST', '/api/change-password', {
            currentPassword: formValue(form, 'currentPassword'),
            newPassword
          });
          form.reset();
          clearDraft(state.currentSection);
          setUnsaved(false);
          showToast('Password changed');
        } catch (error) {
          showToast(error.message, 'error');
        }
      });
    }

    function renderContact() {
      const contact = state.data;
      panelBody.innerHTML = `
        <div class="section-grid">
          <div>
            <form id="contact-form" class="form-card">
              <h3>Contact Text</h3>
              <div class="field">
                <label>Title</label>
                <input type="text" name="title" value="${escapeHtml(contact.title)}" />
              </div>
              <div class="field">
                <label>Subtitle</label>
                <textarea name="subtitle">${escapeHtml(contact.subtitle)}</textarea>
              </div>
              <button class="btn primary" type="submit">Save Contact Text</button>
            </form>
            <h3 class="list-title" style="margin-top: 24px;">Contact Items</h3>
            <div id="contact-items">${contact.items.length ? contact.items.map((item) => renderContactItem(item)).join('') : '<div class="empty">No contact items yet.</div>'}</div>
          </div>
          <form id="contact-item-form" class="form-card">
            <h3>Add Item</h3>
            <div class="field"><label>Icon</label><input type="text" name="icon" required /></div>
            <div class="field"><label>Label</label><input type="text" name="label" required /></div>
            <div class="field"><label>Value</label><input type="text" name="value" required /></div>
            <div class="field"><label>URL</label><input type="url" name="url" required /></div>
            <button class="btn primary" type="submit">Add Item</button>
          </form>
        </div>
      `;

      document.getElementById('contact-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
          await api('PATCH', '/api/content/contact', {
            title: formValue(event.currentTarget, 'title'),
            subtitle: formValue(event.currentTarget, 'subtitle')
          });
          await reloadSection('Contact text saved');
        } catch (error) {
          showToast(error.message, 'error');
        }
      });

      document.getElementById('contact-item-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
          await api('POST', '/api/content/contact/items', contactItemBody(event.currentTarget));
          await reloadSection('Contact item added');
        } catch (error) {
          showToast(error.message, 'error');
        }
      });

      bindContactActions();
    }

    function contactItemBody(form) {
      return {
        icon: formValue(form, 'icon'),
        label: formValue(form, 'label'),
        value: formValue(form, 'value'),
        url: formValue(form, 'url')
      };
    }

    function renderContactItem(item) {
      return `
        <div class="card" data-contact-id="${escapeHtml(item.id)}">
          <div class="item-head">
            <div>
              <h4 class="item-title">${escapeHtml(item.label)}</h4>
              <p class="item-meta">${escapeHtml(item.value)}</p>
              <p class="item-desc">${escapeHtml(item.url)}</p>
            </div>
            <div class="row-actions">
              <button class="btn small" type="button" data-action="edit-contact-item">Edit</button>
              <button class="btn small danger" type="button" data-action="delete-contact-item">Delete</button>
            </div>
          </div>
        </div>
      `;
    }

    function bindContactActions() {
      panelBody.querySelectorAll('[data-action="edit-contact-item"]').forEach((button) => {
        button.addEventListener('click', () => {
          const card = button.closest('[data-contact-id]');
          const item = state.data.items.find((entry) => entry.id === card.dataset.contactId);
          card.innerHTML = `
            <form class="contact-edit-form">
              <div class="form-grid">
                <div class="field"><label>Icon</label><input type="text" name="icon" value="${escapeHtml(item.icon)}" required /></div>
                <div class="field"><label>Label</label><input type="text" name="label" value="${escapeHtml(item.label)}" required /></div>
                <div class="field"><label>Value</label><input type="text" name="value" value="${escapeHtml(item.value)}" required /></div>
                <div class="field"><label>URL</label><input type="url" name="url" value="${escapeHtml(item.url)}" required /></div>
              </div>
              <div class="actions">
                <button class="btn primary" type="submit">Save</button>
                <button class="btn ghost" type="button" data-action="cancel-contact-item">Cancel</button>
              </div>
            </form>
          `;
          card.querySelector('[data-action="cancel-contact-item"]').addEventListener('click', () => renderContact());
          card.querySelector('form').addEventListener('submit', async (event) => {
            event.preventDefault();
            try {
              await api('PUT', `/api/content/contact/items/${item.id}`, contactItemBody(event.currentTarget));
              await reloadSection('Contact item saved');
            } catch (error) {
              showToast(error.message, 'error');
            }
          });
        });
      });

      panelBody.querySelectorAll('[data-action="delete-contact-item"]').forEach((button) => {
        button.addEventListener('click', async () => {
          const id = button.closest('[data-contact-id]').dataset.contactId;
          if (!(await confirmDelete('Delete this contact item?'))) return;
          try {
            await api('DELETE', `/api/content/contact/items/${id}`);
            await reloadSection('Contact item deleted');
          } catch (error) {
            showToast(error.message, 'error');
          }
        });
      });
    }

    async function init() {
      try {
        const me = await api('GET', '/api/me');
        if (me.loggedIn) {
          showDashboard(me.email);
        } else {
          showLogin();
        }
      } catch (error) {
        showLogin();
        showToast(error.message, 'error');
      }
    }

    init();
  </script>
</body>
</html>
